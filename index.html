<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hampden property by Catalyst Real Estate">
  <meta name="robots" content="noindex, nofollow">
  <title>Hampden &mdash; Catalyst Real Estate</title>
  <style>
    :root {
      --primary: #2d4a2b;
      --accent: #d97a3a;
      --bg: #faf7f2;
      --text: #1a2a1a;
      --muted: #6b7b6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      color: var(--primary);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 1.125rem;
      color: var(--muted);
      max-width: 36rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: var(--accent);
      color: white;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    footer {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.875rem;
      color: var(--muted);
    }
    a { color: var(--primary); text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <span class="badge">Coming Soon</span>
    <h1>Hampden</h1>
    <p class="tagline">A new property from Catalyst Real Estate. Full site with floor plans, availability, and gallery launching soon.</p>
  </main>
  <footer>
    <a href="https://catalystmgr.com">Catalyst Real Estate</a>
  </footer>
</body>
</html>
